<!DOCTYPE html>
<html>
<head>

	<link href='https://fonts.googleapis.com/css?family=Alkalami' rel='stylesheet'>
	<link href='https://fonts.googleapis.com/css?family=Noto Serif Vithkuqi' rel='stylesheet'>
	<link href='https://fonts.googleapis.com/css?family=Piazzolla' rel='stylesheet'>
	
	<title>Dead Or Alive</title>
	
	<style>
	
		.header{
			text-align:center;
			font-family:'Piazzolla';
			background-color:#b4b4b4;
			margin-top:0;
			marign-bottom:0;
			padding-top:2px;
			padding-bottom:2px;
		}

		.graves{
			display:grid;
			grid-template-columns:auto auto auto;
			padding:10px;
			padding-top:0px;
			text-align:center;
		}
		
		.main{
			display:grid;
			grid-template-columns:auto auto auto;
			padding:10px;
			padding-top:0px;
			text-align:center;
		}
		.main div{
			padding: 10px;
			font-size: 30px;
			text-align: center;
			justify-self:center;
		}
		
		.buttons{
			font-size:150%;
		}
		
		.gameText{
			font-size:160%
		}
		
		h1{
			font-size:400%;
		}
	</style>
</head>

<body>
	<div class="header">
		<h1>Dead Or Alive</h1>
	</div>
	
	<div class="main">
		<div></div>
		<div style="background-color:#f9f9f9; padding:200px; padding-top:0px;">
		<div class="graves">
			<img id="grave1" src="Gravestone.png" style="height:100px;">
			<img id="grave2" src="Gravestone.png" style="height:100px;">
			<img id="grave3" src="Gravestone.png" style="height:100px;">
		</div>
		<p id="Pname" class="gameText"><b>Name</b></p>
		<img id="Pimage" src="" style="height:400px;">
		<div style="padding:2px; background-color:black; width:100%;"></div>
		<p id="givenYear" class="gameText">0000</p>
		<button id="dead" class="buttons" onclick="dead()">Dead</button>  <button id="alive" class="buttons" onclick="alive()">Alive</button>
		<p id="dateRange" class="gameText" style="visibility:hidden;">0000-0000</p>
		<button id="nextPerson" class="buttons" onclick="nextPerson()" style="visibility:hidden;">Next</button>
		</div>
	</div>

</body>

<script>
let PeopleList = [];
let year=0;
let birth=0;
let death=0;
let lives=3;
let score=0;

async function fetchPeople(){
	const response = await fetch("PeopleList.json");
	PeopleList = await response.json();
	console.log("Fetch Status:",response.ok);
	startGame();
}

function startGame(){
	let search= PeopleList[Math.floor(Math.random() * PeopleList.length)];
	console.log(search);
	let url = "https://en.wikipedia.org/w/api.php?" +
    new URLSearchParams({
      action: "query",
      format: "json",
      origin: "*",
      prop: "pageprops",
      titles: search
    });
	fetchRange(url, search);
	
}


function genRan(mean, stddev = 45) {
    let u = 0, v = 0;
    while(u === 0) u = Math.random();
    while(v === 0) v = Math.random();
    let z = Math.sqrt(-2.0 * Math.log(u)) * Math.cos(2.0 * Math.PI * v);
    return z * stddev + mean;
}


function fetchRange(url, search){
	fetch(url).then(response => response.json()).then(data => {
		console.log(data);
		let pages=data.query.pages;
		const wikidataId = Object.values(pages)[0].pageprops.wikibase_item;
		console.log(wikidataId);
		fetch("https://www.wikidata.org/wiki/Special:EntityData/"+wikidataId+".json").then(response => response.json()).then(data => {
			console.log(data);
			let entity = data.entities[wikidataId];
			let bClaim = entity.claims.P569;
			let dClaim = entity.claims.P570;
			let bTime=bClaim[0].mainsnak.datavalue.value.time;
			let dTime=dClaim[0].mainsnak.datavalue.value.time;
			console.log(bTime);
			console.log(dTime);
			birth=parseInt(bTime.substring(1).split("-")[0]);
			death=parseInt(dTime.substring(1).split("-")[0]);
			console.log(birth);
			console.log(death);
			let iClaim = entity.claims.P18;
			const wImage = iClaim? `https://commons.wikimedia.org/wiki/Special:FilePath/${encodeURIComponent(iClaim[0].mainsnak.datavalue.value)}`: null;
				console.log(wImage);
			document.getElementById("Pname").innerText=search;
			document.getElementById("Pimage").src=wImage;
			document.getElementById("dateRange").innerText=birth+" - "+death;
			let mean = ((parseInt(death)+parseInt(birth))/2);
			console.log(mean);
			year = genRan(mean);
			document.getElementById("givenYear").innerText=Math.round(year);
		})
	})
	
}

function dead(){
	
	if (year<=birth || year>=death){
	document.getElementById("dateRange").innerText="Correct "+birth+" - "+death;
	score+=1;
	document.getElementById("dateRange").style.visibility="visible";
	document.getElementById("nextPerson").style.visibility="visible";
} else { 
	document.getElementById("dateRange").innerText="Incorrect "+birth+" - "+death;
	lives-=1;
	checkLives();
	if (lives==0){
		endGame();
	}
	document.getElementById("dateRange").style.visibility="visible";
	document.getElementById("nextPerson").style.visibility="visible";
	}
}

function alive(){
	if (year>=birth && year<death){
	document.getElementById("dateRange").innerText="Correct "+birth+" - "+death;
	score+=1;
	document.getElementById("dateRange").style.visibility="visible";
	document.getElementById("nextPerson").style.visibility="visible";
} else { 
	document.getElementById("dateRange").innerText="Incorrect "+birth+" - "+death;
	lives-=1;
	checkLives();
	if (lives==0){
		endGame();
	}
	document.getElementById("dateRange").style.visibility="visible";
	document.getElementById("nextPerson").style.visibility="visible";
	}
}

function nextPerson(){
	document.getElementById("Pimage").style.visibility="visible";
	document.getElementById("Pimage").src="Loading.jpg";
	document.getElementById("dateRange").style.visibility="hidden";
	document.getElementById("nextPerson").style.visibility="hidden";
	if (lives==0){
		score=0;
		lives=3;
		document.getElementById("grave1").src="Gravestone.png";
		document.getElementById("grave2").src="Gravestone.png";
		document.getElementById("grave3").src="Gravestone.png";
		document.getElementById("dead").style.visibility="visible";
		document.getElementById("alive").style.visibility="visible";
		document.getElementById("givenYear").style.visibility="visible";
		document.getElementById("Pimage").style.height="400px";
		document.getElementById("nextPerson").innerText="Next";
	}
	startGame();
}

function checkLives(){
	if (lives==2){
		document.getElementById("grave1").src="GravestoneLost.png";
	}
	if (lives==1){
		document.getElementById("grave2").src="GravestoneLost.png";
	}
	if (lives==0){
		document.getElementById("grave3").src="GravestoneLost.png";
	}
}

function endGame(){
	document.getElementById("Pimage").style.visibility="hidden";
	document.getElementById("givenYear").style.visibility="hidden";
	document.getElementById("Pimage").style.height="0px";
	document.getElementById("Pname").innerText="You died!"
	document.getElementById("dateRange").innerText="Your score was "+score;
	document.getElementById("dead").style.visibility="hidden";
	document.getElementById("alive").style.visibility="hidden";
	document.getElementById("nextPerson").innerText="Play Again";
}
window.onload= fetchPeople();

</script>

</html>
